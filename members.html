<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Старший состав LSPD | Форум</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --panel-bg: #14171c;
            --accent-orange: #e57300;
            --border-color: #23272f;
            --text-main: #e3e6e8;
            --text-muted: #8c96a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: Arial, sans-serif;
            padding: 15px;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 14px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .back-btn:hover { background-color: #1a1e24; }

        .post-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .post-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .post-title {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
        }

        .member-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        .member-table th, .member-table td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        .member-table th {
            background-color: #1a1e24;
            color: var(--accent-orange);
        }

        .status-online { color: #22c55e; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Назад в раздел</a>

    <div class="post-container">
        <div class="post-header">
            <div class="post-title">📋 LSPD || Старший состав и руководство фракции</div>
        </div>
        
        <table class="member-table">
            <thead>
                <tr>
                    <th>Должность / Ранг</th>
                    <th>Имя Фамилия (Игровой Ник)</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>Шеф Департамента [10]</strong></td>
                    <td>Mike_Toreno</td>
                    <td><span class="status-online">Действующий лидер</span></td>
                </tr>
                <tr>
                    <td><strong>Зам. Шефа [9]</strong></td>
                    <td>John_Russo</td>
                    <td><span>Активен</span></td>
                </tr>
                <tr>
                    <td><strong>Зам. Шефа [9]</strong></td>
                    <td>Вакантно</td>
                    <td><span style="color: var(--text-muted);">Ожидает обзвона</span></td>
                </tr>
                <tr>
                    <td>Ассистент Шефа [8]</td>
                    <td>Alexander_Flores</td>
                    <td><span>Активен</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
