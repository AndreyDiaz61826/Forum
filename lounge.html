<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курилка LSPD | Форум</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --panel-bg: #14171c;
            --accent-orange: #e57300;
            --border-color: #23272f;
            --text-main: #e3e6e8;
            --text-muted: #8c96a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: Arial, sans-serif;
            padding: 15px;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 14px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .back-btn:hover { background-color: #1a1e24; }

        .chat-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        .chat-header {
            background-color: #1a1e24;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            color: #fff;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            background-color: #1a1e24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-orange);
        }

        .msg-author {
            font-size: 12px;
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 3px;
        }

        .msg-text { font-size: 14px; }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background-color: #101216;
            border-top: 1px solid var(--border-color);
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            outline: none;
        }

        .chat-send-btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Назад в раздел</a>

    <div class="chat-container">
        <div class="chat-header">💬 Курилка / Свободное общение состава</div>
        <div class="chat-messages" id="chat-box">
            <div class="msg">
                <div class="msg-author">Mike_Toreno [Шеф LSPD]</div>
                <div class="msg-text">Приветствую всех! Тут вы можете свободно общаться, делиться скриншотами и задавать вопросы. Помните про адекватное поведение!</div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="user-msg" class="chat-input" placeholder="Введите ваше сообщение...">
            <button class="chat-send-btn" onclick="sendMsg()">Отправить</button>
        </div>
    </div>

    <script>
        function sendMsg() {
            const input = document.getElementById('user-msg');
            const text = input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById('chat-box');
            const newMsg = document.createElement('div');
            newMsg.className = 'msg';
            newMsg.innerHTML = `
                <div class="msg-author">Сотрудник LSPD</div>
                <div class="msg-text">${text}</div>
            `;
            chatBox.appendChild(newMsg);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
