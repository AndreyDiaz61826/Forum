<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система повышения | Форум</title>
    <style>
        :root { --bg-dark: #0f1115; --panel-bg: #14171c; --accent-orange: #e57300; --border-color: #23272f; --text-main: #e3e6e8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: Arial, sans-serif; padding: 15px; display: none; }
        .back-btn { display: inline-block; padding: 8px 14px; background-color: var(--panel-bg); border: 1px solid var(--border-color); color: #fff; text-decoration: none; border-radius: 4px; font-size: 13px; margin-bottom: 15px; }
        .post-container { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; }
        .post-title { font-size: 18px; color: #fff; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .rank-box { background-color: #1a1e24; border: 1px solid var(--border-color); padding: 12px; margin: 10px 0; border-radius: 4px; }
        .rank-title { color: var(--accent-orange); font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Назад на форум</a>

    <div class="post-container">
        <div class="post-title">📈 LSPD || Система повышения сотрудников [1-9]</div>
        <div class="rank-box">
            <div class="rank-title">Стажёр [1] ➔ Офицер [2]</div>
            <p>- Сдать Единый Устав Министерства Юстиции.<br>- Получить роль в спец.рации Discord.</p>
        </div>
    </div>

    <script>
        if(!sessionStorage.getItem('active_session')) {
            alert("Доступ запрещен! Войдите в аккаунт на главной странице.");
            window.location.href = 'index.html';
        } else {
            document.body.style.display = 'block';
        }
    </script>
</body>
</html>
